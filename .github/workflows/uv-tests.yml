name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COLUMNS: 200
  # Many color libraries just need this variable to be set to any value.
  # Set it to 3 to support 8-bit color graphics (256 colors per channel)
  # for libraries that care about the value set.
  FORCE_COLOR: 3

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  copier-template-tester:
    name: copier-template-tester (uv ${{ matrix.uv-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        uv-version: ["0.10.12", "latest"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: ${{ matrix.uv-version }}
      - name: Configure Git
        run: |
          git config --global user.email "template-tester@example.com"
          git config --global user.name "template-tester"
      - name: Cache prek
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('project_name/.pre-commit-config.yaml.jinja') }}
          restore-keys: |
            prek-${{ runner.os }}-
      - name: Run copier-template-tester
        run: uv run ctt
